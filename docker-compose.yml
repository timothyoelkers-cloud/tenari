services:
  # ── Dev infrastructure ────────────────────────────────────────────────────
  # Run with: docker compose up -d
  # These are the only services needed for local development.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenari
      POSTGRES_PASSWORD: tenari
      POSTGRES_DB: tenari
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenari"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025

  # ── Storage (optional — only needed for PDF report generation) ───────────
  # Start with: docker compose --profile storage up -d
  minio:
    profiles: ["storage"]
    image: quay.io/minio/minio:latest
    platform: linux/arm64
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"   # Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # ── Production app (not used in dev — run npm run dev instead) ───────────
  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://tenari:tenari@postgres:5432/tenari
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
